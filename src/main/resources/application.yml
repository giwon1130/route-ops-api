spring:
  application:
    name: route-ops-api

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8087

logging:
  level:
    com.giwon.routeops: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173}
